name = "solitary-intake-v1"
main = "workers/solitary-term-worker.js"
compatibility_date = "2026-04-26"

# Dedicated worker profile for Contact/Careers intake v1.
# Configure production route/domain in Cloudflare dashboard or CI, for example:
# route = "intake.gabo.services/v1/intake/*"
# workers_dev = true

[vars]
ALLOWED_ORIGINS = "https://www.gabo.services,https://gabo.services"
MAX_BODY_BYTES = "32768"
UPSTREAM_TIMEOUT_MS = "10000"

# Secrets to set with `wrangler secret put`:
# - ASSET_C5T
# - ASSET_C5S
# - SOLITARY_TO_CORREO_SHARED_SECRET

# Service binding expected by workers/solitary-term-worker.js:
# [[services]]
# binding = "DELIVERY"
# service = "correo-paginas"

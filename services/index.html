    <style>
      body[data-page-key='services'] {
        background:
          radial-gradient(circle at top right, rgba(29, 53, 87, 0.08), transparent 30%),
          linear-gradient(180deg, #f2f4f7 0%, #e8ecf2 100%);
      }

      .services-main {
        width: min(calc(100vw - 40px), 980px);
        margin: 0 auto;
        padding: 2rem 0 5rem;
      }

      .services-shell {
        background: #f4f6fa;
        border: 1px solid #c8d3e2;
        border-radius: 24px;
        padding: clamp(1.2rem, 3vw, 2rem);
        box-shadow: 0 14px 34px rgba(17, 36, 62, 0.1);
        color: #0f2948;
      }

      .services-shell h1 {
        margin-top: 0;
        margin-bottom: 0.75rem;
      }

      .services-shell p {
        margin-top: 0;
        color: #405a79;
      }

      .service-links {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        gap: 0.85rem;
        margin-top: 1.25rem;
      }

      .service-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        border-radius: 12px;
        border: 1px solid #1d4b86;
        background: #12396b;
        color: #ffffff;
        font-weight: 700;
        text-decoration: none;
        text-align: center;
        padding: 0.75rem 0.9rem;
      }

      .service-link:hover,
      .service-link:focus-visible {
        background: #1d4b86;
      }
    </style>
  </head>
  <body data-page-key="services">
    <a class="skip-link" href="#main">Skip to main content</a>

    <header class="site-header" data-include="header"></header>

    <main id="main" class="services-main" aria-labelledby="services-title">
      <section class="services-shell" aria-label="Services directory">
        <h1 id="services-title">Our Services</h1>
        <p>Select a service below to view details.</p>

        <div class="service-links">
          <a class="service-link" href="/services/logistics-operations/">Logistics Operations</a>
          <a class="service-link" href="/services/administrative-backoffice/">Administrative Backoffice</a>
          <a class="service-link" href="/services/customer-relations/">Customer Relations</a>
          <a class="service-link" href="/services/it-support/">IT Support</a>
        </div>
      </section>
    </main>

    <footer class="site-footer" data-include="footer"></footer>
  </body>

name = "gabo-contact-careers-intake"
main = "workers.contact-careers-intake.js"
compatibility_date = "2026-04-12"

# Configure production route/domain in Cloudflare dashboard or via CI.
# route = "intake.gabo.services/*"
# workers_dev = true

[vars]
# Optional override (default is solitary-term worker)
REMOTE_WORKER_URL = "https://solitary-term-4203.rulathemtodos.workers.dev"
# Restrict allowed browser origins for CORS
ALLOWED_ORIGINS = "https://www.gabo.services,https://gabo.services"

# Secrets to set with `wrangler secret put`:
# - ASSET_C5T  (Contact asset id for Gmail channel)
# - ASSET_C5S  (Careers asset id for Google Sheets channel)
# - TURNSTILE_SECRET_KEY (Cloudflare Turnstile secret for server-side verification)

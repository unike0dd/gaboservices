name = "correo-paginas"
main = "workers.contact-careers-intake.js"
compatibility_date = "2026-04-12"

# Configure production route/domain in Cloudflare dashboard or via CI.
# route = "intake.gabo.services/*"
# workers_dev = true

[vars]
# Restrict allowed browser origins for CORS
ALLOWED_ORIGINS = "https://www.gabo.services,https://gabo.services"
UPSTREAM_TIMEOUT_MS = "10000"

# Secrets to set with `wrangler secret put`:
# - APPS_SCRIPT_BRIDGE_URL
# - APPS_SCRIPT_BRIDGE_TOKEN
# - SOLITARY_TO_CORREO_SHARED_SECRET

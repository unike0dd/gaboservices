name: Chattia OPS AI Chatbot
api_path: /api/ops-online-chat
request:
  method: POST
  content_type: application/json
  body_fields:
    - message
    - lang
response:
  content_type: application/json
  reply_field: reply
limits:
  max_message_length: 256
security:
  same_origin_api: true
  expose_workers_dev_url: false

name: Sync public media to Cloudflare R2

on:
  push:
    branches:
      - main
    paths:
      - 'public-media/**'
      - '.github/workflows/r2-sync.yml'
  workflow_dispatch:

jobs:
  sync-r2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install --global wrangler@4

      - name: Sync media directory to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          if [ -z "${R2_BUCKET_NAME}" ]; then
            echo "R2_BUCKET_NAME secret is missing."
            exit 1
          fi

          if [ ! -d "public-media" ]; then
            echo "public-media directory not found; nothing to sync."
            exit 0
          fi

          wrangler r2 bucket sync ./public-media "r2://${R2_BUCKET_NAME}" --delete

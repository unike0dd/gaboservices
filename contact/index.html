<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gabriel Services | Contact Form</title>
    <style>
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --border: #e2e8f0;
        --accent: #1e40af;
        --accent-dark: #1e3a8a;
        --danger: #dc2626;
        --radius: 12px;
        --radius-sm: 8px;
        --shadow: 0 10px 28px -6px rgba(15, 23, 42, 0.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
        padding: 20px 16px 56px;
      }
      .container { max-width: 1080px; margin: 0 auto; }
      .form-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 32px;
      }
      h1 { margin: 0 0 8px; font-size: clamp(1.5rem, 4vw, 2.1rem); }
      h2 { margin: 0 0 20px; font-size: clamp(1.1rem, 3vw, 1.32rem); }
      .intro { margin: 0 0 24px; color: var(--muted); }
      .section { padding-top: 28px; margin-top: 28px; border-top: 1px solid var(--border); }
      .section:first-of-type { border-top: 0; margin-top: 0; padding-top: 0; }
      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 20px 24px;
      }
      .field { display: flex; flex-direction: column; gap: 8px; }
      .field.full { grid-column: 1 / -1; }
      .phone-split { display: grid; grid-template-columns: 120px 1fr; gap: 12px; }
      label { font-size: 0.95rem; font-weight: 600; }
      .label-required::after { content: ' *'; color: var(--danger); font-weight: 400; }
      input, select {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 1rem;
      }
      input:focus, select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(30, 64, 175, 0.12);
      }
      .checkbox-group {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }
      .checkbox-item {
        display: flex;
        align-items: center;
        gap: 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        background: #f8fafc;
        padding: 10px 12px;
      }
      .checkbox-item input { width: 18px; height: 18px; accent-color: var(--accent); }
      .repeat-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; }
      .repeat-list { display: grid; gap: 12px; margin-top: 8px; }
      .btn-small, .btn-submit {
        font-weight: 600;
        cursor: pointer;
        border-radius: 999px;
      }
      .btn-small { padding: 9px 16px; border: 1px solid var(--border); background: #f1f5f9; }
      .btn-small.remove { color: var(--danger); }
      .btn-submit { padding: 14px 32px; border: 0; color: #fff; background: var(--accent); }
      .form-footer { margin-top: 28px; }
      @media (max-width: 960px) {
        .form-card { padding: 24px; }
        .form-grid { grid-template-columns: 1fr; }
      }
      @media (max-width: 640px) {
        body { padding: 12px 10px 40px; }
        .phone-split, .repeat-row { grid-template-columns: 1fr; }
        .btn-submit { width: 100%; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <section class="form-card">
        <h1>Contact Form</h1>
        <p class="intro">Please provide your contact information and tell us about the remote assistant support you are looking for.</p>
        <form id="contactForm" novalidate>
          <div class="section">
            <h2>Contact Information</h2>
            <div class="form-grid">
              <div class="field full">
                <label class="label-required" for="cFullName">Full Name</label>
                <input id="cFullName" type="text" name="fullName" required placeholder="Your full name" />
              </div>
              <div class="field">
                <label class="label-required" for="cEmail">Email Address</label>
                <input id="cEmail" type="email" name="email" required placeholder="your@email.com" />
              </div>
              <div class="field">
                <label class="label-required">Contact Number</label>
                <div class="phone-split">
                  <input type="text" name="countryCode" placeholder="+593" required />
                  <input type="tel" name="phone" placeholder="Phone number" required />
                </div>
              </div>
              <div class="field"><label for="cCity">City</label><input id="cCity" type="text" name="city" placeholder="City" /></div>
              <div class="field"><label for="cState">State / Province</label><input id="cState" type="text" name="state" placeholder="State or Province" /></div>
              <div class="field"><label for="cZip">Zip / Postal Code</label><input id="cZip" type="text" name="zip" placeholder="Zip / Postal Code" /></div>
              <div class="field"><label for="bestTime">Best Time to Contact You</label><input id="bestTime" type="datetime-local" name="bestContactTime" /></div>
              <div class="field full">
                <label>Area of Interest</label>
                <div class="checkbox-group">
                  <label class="checkbox-item"><input type="checkbox" name="areaInterest[]" value="Logistics Operations" /> Logistics Operations</label>
                  <label class="checkbox-item"><input type="checkbox" name="areaInterest[]" value="Administrative Back Office" /> Administrative Back Office</label>
                  <label class="checkbox-item"><input type="checkbox" name="areaInterest[]" value="Customer Relations" /> Customer Relations</label>
                  <label class="checkbox-item"><input type="checkbox" name="areaInterest[]" value="IT Support" /> IT Support</label>
                </div>
              </div>
            </div>
          </div>

          <div class="section">
            <h2>Inquiry about Remote Assistant</h2>
            <div class="form-grid">
              <div class="field full">
                <label>Skills</label>
                <div class="repeat-list" id="cSkillsList">
                  <div class="repeat-row">
                    <input type="text" name="skills[]" placeholder="e.g. Excel, CRM, QuickBooks" />
                    <button type="button" class="btn-small remove" data-remove>- Remove</button>
                  </div>
                </div>
                <button type="button" class="btn-small" data-add-simple="cSkillsList" data-name="skills[]" data-ph="e.g. Excel, CRM">Add +</button>
              </div>
              <div class="field full">
                <label>Area of Interest</label>
                <div class="checkbox-group">
                  <label class="checkbox-item"><input type="checkbox" name="inquiryArea[]" value="Logistics Operations" /> Logistics Operations</label>
                  <label class="checkbox-item"><input type="checkbox" name="inquiryArea[]" value="Administrative Back Office" /> Administrative Back Office</label>
                  <label class="checkbox-item"><input type="checkbox" name="inquiryArea[]" value="Customer Relations" /> Customer Relations</label>
                  <label class="checkbox-item"><input type="checkbox" name="inquiryArea[]" value="IT Support" /> IT Support</label>
                </div>
              </div>
              <div class="field">
                <label for="cExpLevel">Experience Level</label>
                <select id="cExpLevel" name="experienceLevel">
                  <option value="">Select level</option><option>Entry</option><option>Junior</option><option>Mid</option><option>Advanced</option><option>Expert</option>
                </select>
              </div>
              <div class="field full">
                <label>Languages</label>
                <div class="repeat-list" id="cLanguagesList">
                  <div class="repeat-row">
                    <input type="text" name="languages[]" placeholder="e.g. Spanish – Native, English – Advanced" />
                    <button type="button" class="btn-small remove" data-remove>- Remove</button>
                  </div>
                </div>
                <button type="button" class="btn-small" data-add-simple="cLanguagesList" data-name="languages[]" data-ph="e.g. Spanish – Native">Add +</button>
              </div>
            </div>
            <div class="form-footer">
              <button class="btn-submit" type="submit">Request Information / Inquire</button>
            </div>
          </div>
        </form>
      </section>
    </div>

    <script>
      document.addEventListener('click', (e) => {
        const t = e.target;
        if (t.matches('[data-remove], .remove')) {
          const row = t.closest('.repeat-row');
          if (!row) return;
          const list = row.parentElement;
          if (list.children.length > 1) {
            row.remove();
          } else {
            row.querySelectorAll('input').forEach((el) => (el.value = ''));
          }
          return;
        }
        if (t.hasAttribute('data-add-simple')) {
          const list = document.getElementById(t.getAttribute('data-add-simple'));
          if (!list) return;
          const row = document.createElement('div');
          row.className = 'repeat-row';
          row.innerHTML = `<input type="text" name="${t.getAttribute('data-name')}" placeholder="${t.getAttribute('data-ph') || 'Add item'}" /><button type="button" class="btn-small remove" data-remove>- Remove</button>`;
          list.appendChild(row);
        }
      });
    </script>
  </body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Default Placeholder Image</title>
  <desc id="desc">A neutral placeholder image for future uploads.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <g fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="600" y="290" font-size="54" font-weight="700">Default Image</text>
    <text x="600" y="350" font-size="30" opacity="0.9">Replace this file with your own media assets</text>
    <text x="600" y="410" font-size="24" opacity="0.75">Path: /images/default-image.svg</text>
  </g>
</svg>
